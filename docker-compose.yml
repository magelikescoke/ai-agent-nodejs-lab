services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-nodejs-lab-app
    restart: unless-stopped
    env_file:
      - apps/ai-ticket-classifier/.env.example
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://root:example@mongodb:27017/ai_ticket_classifier?authSource=admin
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: ai-agent-nodejs-lab-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: ai_ticket_classifier
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '--eval',
          'db.adminCommand("ping").ok',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ai-agent-nodejs-lab-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ai-agent-nodejs-lab-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
